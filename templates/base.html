<!DOCTYPE html>
<html lang="{{ lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.bootcdn.net/ajax/libs/pure/3.0.0/pure-min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/pure/3.0.0/grids-responsive-min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v={{ get_random(start=10000, end=99999) }}">
    <title>{{ config.title }}</title>
</head>

<body>
    <div class="main pure-g">
        <div class="pure-u-md-1-3 pure-u-1">
            <div class="side">
                <a href="/" class="logo">
                    <img src="/logo1.png" alt="Logo" class="pure-img avatar">
                    <h1 class="logo-title only-mobile">{{ config.title }}</h1>
                </a>
                <div class="only-desktop">
                    {% block side %}{% endblock side %}
                </div>
                <div>
                    {% block side2 %}{% endblock side2 %}
                </div>
            </div>
        </div>
        <div class="pure-u-md-2-3 pure-u-1">
            <div class="content">
                {% block content %}{% endblock content %}
            </div>
            <div class="last-updated only-mobile">
                最后更新：{{ now() | date(format="%Y/%m/%d")}}
            </div>
        </div>
    </div>

<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "7cb768824eff4d8ab70dd33b58e439ea"}'></script><!-- End Cloudflare Web Analytics -->
</body>

<!-- Generated: {{ now() | date(format="%Y/%m/%d %H:%M") }} -->

</html>
