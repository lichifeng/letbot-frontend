<!DOCTYPE html>
<html lang="{{ lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
        integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">
    <link rel="stylesheet" href="/style.css">
    <title>{{ config.title }}</title>
</head>

<body>
    <div class="main pure-g">
        <div class="pure-u-md-1-3 pure-u-1">
            <div class="side">
                <a href="/" class="logo">
                    <img src="/logo1.png" alt="Logo" class="pure-img avatar">
                    <h1 class="logo-title only-mobile">{{ config.title }}</h1>
                </a>
                <div class="only-desktop">
                    {% block side %}{% endblock side %}
                </div>
                <div>
                    {% block side2 %}{% endblock side2 %}
                </div>
            </div>
        </div>
        <div class="pure-u-md-2-3 pure-u-1">
            <div class="content">
                {% block content %}{% endblock content %}
            </div>
            <div class="last-updated only-mobile">
                最后更新：{{ now() | date(format="%Y/%m/%d")}}
            </div>
        </div>
    </div>
</body>

<!-- Generated: {{ now() | date(format="%Y/%m/%d %H:%M") }} -->

</html>
