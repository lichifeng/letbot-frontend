{% extends "base.html" %}

{% block content %}
<h1 class="title">
    #️⃣ 标签列表
</h1>

<div class="tag-list">
    {% for t in terms %}
    <a href="/tags/{{ t.slug | lower }}" class="pseudo button"><strong>#</strong> {{ t.name }}</a>
    {% endfor %}
</div>

{% endblock content %}
    
{% block side %}
<a href="/">
  <img src="/catlogo.png" alt="Logo" style="width:100%; height:auto;">
</a>

<p class="about">
  欢迎使用<strong>『 LET情报站 』</strong>，点击感兴趣的标签浏览相关内容。
</p>
{% endblock side %}
