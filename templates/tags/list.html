{% extends "base.html" %}

{% block content %}
<h1 class="title">
    #️⃣ 标签列表
</h1>

<ul class="tag-list">
    {% for t in terms %}
    <li><a href="/tags/{{ t.slug | lower }}" class="pseudo button"><strong>#</strong> {{ t.name }}</a>({{ t.page_count }})</li>
    {% endfor %}
</ul>

{% endblock content %}

{% block side %}
<p>
  欢迎访问<strong>『 {{ config.title }} 』</strong>，点击感兴趣的标签浏览相关内容。
</p>
<p>
  共有 <code>{{ terms | length }}</code> 个标签。
</p>
{% endblock side %}
