name: Build and Deploy Zola Site

on:
  workflow_dispatch:
    inputs:
      remote_host:
        description: '远程服务器地址'
        required: true
      remote_user:
        description: 'SSH 用户名'
        required: true
        default: 'root'
      remote_pass:
        description: 'SSH 密码'
        required: true
      remote_target:
        description: '部署目的地路径'
        required: true
        default: '~/github-action-test/'
      resumeUrl:
        description: 'callback url'
        required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装并设置 Zola 环境
      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      # 2. 构建站点
      - name: Build Zola site
        run: zola build

      # 3. 检查远程服务器是否有 unzip
      - name: Check for unzip on remote
        id: check_unzip
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ github.event.inputs.remote_host }}
          username: ${{ github.event.inputs.remote_user }}
          password: ${{ github.event.inputs.remote_pass }}
          script: command -v unzip > /dev/null 2>&1

      # 4. 如果有 unzip：压缩文件
      - name: Compress files
        if: steps.check_unzip.outcome == 'success'
        run: |
          cd public
          zip -r ../deploy.zip .
          cd ..

      # 5. 如果有 unzip：上传压缩包并解压
      - name: Deploy via Zip (Unzip exists)
        if: steps.check_unzip.outcome == 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.event.inputs.remote_host }}
          username: ${{ github.event.inputs.remote_user }}
          password: ${{ github.event.inputs.remote_pass }}
          source: "deploy.zip"
          target: ${{ github.event.inputs.remote_target }}

      - name: Extract and Cleanup
        if: steps.check_unzip.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.event.inputs.remote_host }}
          username: ${{ github.event.inputs.remote_user }}
          password: ${{ github.event.inputs.remote_pass }}
          script: |
            cd ${{ github.event.inputs.remote_target }}
            unzip -o deploy.zip
            rm deploy.zip

      # 6. 如果没有 unzip：回退到原始 SCP 模式
      - name: Copy files via SCP (Unzip missing)
        if: steps.check_unzip.outcome != 'success'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.event.inputs.remote_host }}
          username: ${{ github.event.inputs.remote_user }}
          target: ${{ github.event.inputs.remote_target }}
          password: ${{ github.event.inputs.remote_pass }}
          source: "public/*"
          strip_components: 1

      # 7. 访问 Webhook
      - name: Trigger Webhook
        run: |
          if [ -n "${{ github.event.inputs.resumeUrl }}" ]; then
            echo "Resume URL detected. Sending callback..."
            curl -X POST "${{ github.event.inputs.resumeUrl }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "success", "event": "deploy_completed"}'
          else
            echo "No resume URL provided, skipping callback."
          fi
